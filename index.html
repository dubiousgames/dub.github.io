<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubious Games - Independent Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050508;
    --panel: #0d0d12;
    --border: #1e1e2e;
    --white: #ffffff;
    --dim: #777799;
    --neon-blue: #00d2ff;
    --neon-purple: #9d00ff;
    --neon-green: #39ff14;
    --neon-yellow: #f4d03f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 1.5rem;
    background: rgba(5,5,8,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--white);
    text-shadow: 0 0 10px var(--neon-blue);
    text-decoration: none;
    letter-spacing: 0.1em;
  }

  .hero {
    min-height: 40vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 2rem;
    text-align: center;
  }

  .hero-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    line-height: 1.1;
    text-transform: uppercase;
  }

  section { padding: 4rem 3rem; max-width: 1200px; margin: 0 auto; }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.4em;
    color: var(--dim);
    margin-bottom: 2rem;
    display: block;
    border-left: 2px solid var(--neon-blue);
    padding-left: 15px;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2rem;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transition: 0.3s;
  }
  .game-card:hover { transform: translateY(-5px); }

  .studio-rules {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    margin-top: 2rem;
  }

  .rule-item { margin-bottom: 1.5rem; display: flex; gap: 15px; }
  .rule-num { font-family: 'Space Mono'; color: var(--neon-blue); font-weight: bold; }
  .rule-text { font-size: 0.95rem; color: var(--dim); }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .member { background: var(--panel); padding: 2rem; border-radius: 8px; border-top: 3px solid var(--border); }
  
  footer { text-align: center; padding: 4rem; border-top: 1px solid var(--border); color: var(--dim); font-family: 'Space Mono'; font-size: 0.7rem; }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">DUBIOUS GAMES</a>
</nav>

</div>

    <h2 style="font-family:'Space Mono'; color: var(--neon-blue);">KIDS ZONE</h2>
    <p style="color: white; margin-top: 10px;">Safe and accessible gaming for all ages.</p>

  </a>
